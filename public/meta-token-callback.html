<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Token 回呼處理</title>
  <style>
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #f6f1e6, #e9f2ef);
      color: #22313f;
      padding: 16px;
    }

    .card {
      width: min(620px, 100%);
      background: #fffdf8;
      border: 1px solid #d9ccb2;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(34, 49, 63, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.3rem;
    }

    p {
      margin: 8px 0;
      line-height: 1.5;
    }

    .muted {
      color: #5c6975;
      font-size: 0.92rem;
    }

    .error {
      color: #b33f2a;
      font-weight: 700;
    }

    button {
      border: none;
      background: #0f7b6c;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Meta 授權處理中</h1>
    <p id="status">正在接收授權資訊...</p>
    <p class="muted">完成後會自動更新 ACCESS_TOKEN 並回到主頁。</p>
    <button id="backBtn" type="button" hidden>回主頁</button>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const backBtn = document.getElementById('backBtn');

    function getHashParams() {
      const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
      return new URLSearchParams(hash);
    }

    function notifyOpener(payload) {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(payload, window.location.origin);
      }
    }

    async function saveTokenAndReturn() {
      const params = getHashParams();
      const accessToken = params.get('access_token');
      if (!accessToken) {
        statusEl.textContent = '未收到 access_token，請重新授權。';
        statusEl.classList.add('error');
        backBtn.hidden = false;
        notifyOpener({ type: 'meta-token-updated', ok: false, message: '未收到 access_token，請重新授權。' });
        return;
      }

      statusEl.textContent = '收到 token，正在寫入伺服器 .env...';

      try {
        const response = await fetch('/api/meta/token', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ accessToken })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || '更新 token 失敗');
        }

        statusEl.textContent = 'ACCESS_TOKEN 已更新，正在返回主頁...';
        notifyOpener({ type: 'meta-token-updated', ok: true });
        setTimeout(() => {
          if (window.opener && !window.opener.closed) {
            window.close();
            return;
          }
          window.location.href = '/';
        }, 400);
      } catch (error) {
        statusEl.textContent = `寫入失敗：${error.message}`;
        statusEl.classList.add('error');
        backBtn.hidden = false;
        notifyOpener({ type: 'meta-token-updated', ok: false, message: `寫入失敗：${error.message}` });
      }
    }

    backBtn.addEventListener('click', () => {
      window.location.href = '/';
    });

    saveTokenAndReturn();
  </script>
</body>
</html>
